<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foyer</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body class="theme-cream">

  <div id="app">
    <div id="grid"></div>
  </div>

  <!-- Marquee selection box -->
  <div id="sel-box"></div>

  <!-- Fixed Add Button -->
  <button id="add-btn" aria-label="Add site">+</button>

  <!-- Add Site Modal -->
  <div id="add-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 class="modal-title">Add Site</h2>

      <!-- Live favicon preview -->
      <div id="favicon-preview-box">
        <img id="favicon-preview-img" alt="" style="display:none" draggable="false">
        <span id="favicon-preview-letter">?</span>
      </div>

      <div class="input-group">
        <label>URL</label>
        <input type="url" id="url-input" placeholder="https://example.com" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="name-input" placeholder="My Site" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-add">Cancel</button>
        <button class="btn-confirm" id="confirm-add">Add</button>
      </div>
    </div>
  </div>

  <!-- Edit Site Modal -->
  <div id="edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 class="modal-title">Edit Site</h2>

      <div id="edit-favicon-preview-box">
        <img id="edit-favicon-preview-img" alt="" style="display:none" draggable="false">
        <span id="edit-favicon-preview-letter">?</span>
      </div>

      <div class="input-group">
        <label>URL</label>
        <input type="url" id="edit-url-input" placeholder="https://example.com" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="edit-name-input" placeholder="My Site" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-edit">Cancel</button>
        <button class="btn-confirm" id="confirm-edit">Save</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div id="rename-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 class="modal-title">Rename</h2>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="rename-input" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-rename">Cancel</button>
        <button class="btn-confirm" id="confirm-rename">Save</button>
      </div>
    </div>
  </div>

  <!-- Group Overlay -->
  <div id="group-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="group-backdrop"></div>
    <div id="group-panel">
      <div id="group-header">
        <span id="group-title"></span>
      </div>
      <!-- Swipeable pages container -->
      <div id="group-pages-container">
        <div id="group-pages-track"></div>
      </div>
      <!-- Page indicator dots -->
      <div id="group-dots"></div>
      <button id="close-group" aria-label="Close group">✕</button>
    </div>
  </div>

  <!-- Import Bookmarks Modal -->
  <div id="import-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card" id="import-card">
      <h2 class="modal-title">Import Bookmarks</h2>
      <div id="import-toolbar">
        <span id="import-sel-count">0 selected</span>
        <div id="import-toolbar-btns">
          <button id="import-select-all">Select all</button>
          <button id="import-deselect-all">Deselect all</button>
        </div>
      </div>
      <div id="import-list"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-import">Cancel</button>
        <button class="btn-confirm" id="confirm-import" disabled>Import</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden" role="menu">
    <button class="ctx-item" data-action="rename">Rename</button>
    <button class="ctx-item ctx-danger" data-action="delete">Delete</button>
  </div>

  <!-- Theme Picker -->
  <div id="theme-picker">
    <!-- Config button (settings/backup actions) -->
    <button id="config-btn" title="Settings" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div id="config-panel" class="hidden">
      <button class="swatch-import-btn" id="swatch-import" title="Import from Chrome bookmarks">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        Import bookmarks
      </button>
      <div class="swatch-separator"></div>
      <button class="swatch-import-btn" id="swatch-export-json" title="Export backup">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export backup
      </button>
      <button class="swatch-import-btn" id="swatch-export-html" title="Export as Bookmarks HTML">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
        Export as bookmarks
      </button>
      <button class="swatch-import-btn" id="swatch-import-json" title="Import backup">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Import backup
      </button>
    </div>

    <!-- Theme / colour button -->
    <button id="theme-btn" title="Change theme" aria-label="Change theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/>
        <circle cx="8.5"  cy="7.5" r="1.5"/><circle cx="6.5"  cy="12"   r="1.5"/>
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2v-.5c0-.55.45-1 1-1h2c2.76 0 5-2.24 5-5 0-5.52-4.48-10-10-10z"/>
      </svg>
    </button>
    <div id="theme-swatches" class="hidden">
      <button class="swatch" data-theme="pink"   title="Pink"></button>
      <button class="swatch" data-theme="blue"   title="Blue"></button>
      <button class="swatch" data-theme="yellow" title="Yellow"></button>
      <button class="swatch" data-theme="dark"   title="Dark"></button>
      <button class="swatch" data-theme="cream"  title="Cream"></button>
      <button class="swatch swatch-custom" id="swatch-custom" title="Custom color"></button>
      <div class="swatch-separator"></div>
      <button class="swatch swatch-image" id="swatch-image" title="Background image">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
    </div>

    <input type="color" id="custom-color-input" value="#4a90d9"
           style="position:fixed;opacity:0;pointer-events:none;width:0;height:0">
    <input type="file" id="bg-image-input" accept="image/*"
           style="position:fixed;opacity:0;pointer-events:none;width:0;height:0">
    <input type="file" id="json-import-input" accept=".json,application/json"
           style="position:fixed;opacity:0;pointer-events:none;width:0;height:0">
  </div>

  <!-- Confirm Modal (generic) -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card confirm-card">
      <h2 class="modal-title" id="confirm-modal-title"></h2>
      <p id="confirm-modal-body"></p>
      <div class="modal-actions">
        <button class="btn-cancel" id="confirm-modal-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-modal-ok">Restore</button>
      </div>
    </div>
  </div>

  <!-- Tutorial Overlay -->
  <div id="tutorial-overlay" class="hidden">
    <div id="tutorial-spotlight"></div>
    <div id="tutorial-card">
      <strong id="tutorial-title"></strong>
      <p id="tutorial-body"></p>
      <div id="tutorial-dots"></div>
      <div id="tutorial-actions">
        <button id="tutorial-skip">Skip</button>
        <button id="tutorial-next">Next →</button>
      </div>
    </div>
  </div>

  <!-- Search / Quick Launch -->
  <div id="search-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Quick search">
    <div id="search-box">
      <div id="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search sites…" autocomplete="off" spellcheck="false" aria-label="Search">
        <kbd>esc</kbd>
      </div>
      <div id="search-results" role="listbox"></div>
    </div>
  </div>

  <!-- Toast / Undo notification -->
  <div id="toast" aria-live="polite"></div>

  <script src="newtab.js"></script>
</body>
</html>
