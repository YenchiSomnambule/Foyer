<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foyer</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body class="theme-yellow">

  <div id="app">
    <div id="grid"></div>
  </div>

  <!-- Fixed Add Button -->
  <button id="add-btn" aria-label="Add site">+</button>

  <!-- Add Site Modal -->
  <div id="add-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 class="modal-title">Add Site</h2>

      <!-- Live favicon preview -->
      <div id="favicon-preview-box">
        <img id="favicon-preview-img" alt="" style="display:none" draggable="false">
        <span id="favicon-preview-letter">?</span>
      </div>

      <div class="input-group">
        <label>URL</label>
        <input type="url" id="url-input" placeholder="https://example.com" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="name-input" placeholder="My Site" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-add">Cancel</button>
        <button class="btn-confirm" id="confirm-add">Add</button>
      </div>
    </div>
  </div>

  <!-- Edit Site Modal -->
  <div id="edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 class="modal-title">Edit Site</h2>

      <div id="edit-favicon-preview-box">
        <img id="edit-favicon-preview-img" alt="" style="display:none" draggable="false">
        <span id="edit-favicon-preview-letter">?</span>
      </div>

      <div class="input-group">
        <label>URL</label>
        <input type="url" id="edit-url-input" placeholder="https://example.com" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="edit-name-input" placeholder="My Site" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-edit">Cancel</button>
        <button class="btn-confirm" id="confirm-edit">Save</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div id="rename-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 class="modal-title">Rename</h2>
      <div class="input-group">
        <label>Name</label>
        <input type="text" id="rename-input" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-rename">Cancel</button>
        <button class="btn-confirm" id="confirm-rename">Save</button>
      </div>
    </div>
  </div>

  <!-- Group Open Overlay (iPhone-style folder) -->
  <div id="group-overlay" class="hidden" role="dialog" aria-modal="true">
    <div id="group-backdrop"></div>
    <div id="group-panel">
      <div id="group-header">
        <span id="group-title"></span>
      </div>
      <!-- Swipeable pages container -->
      <div id="group-pages-container">
        <div id="group-pages-track"></div>
      </div>
      <!-- Page indicator dots -->
      <div id="group-dots"></div>
      <button id="close-group" aria-label="Close group">✕</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden" role="menu">
    <button class="ctx-item" data-action="rename">Rename</button>
    <button class="ctx-item ctx-danger" data-action="delete">Delete</button>
  </div>

  <!-- Task Button + Panel -->
  <button id="task-btn" aria-label="Quick tasks">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 11 12 14 22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
  </button>

  <div id="task-panel" class="hidden">
    <div id="task-panel-header">
      <span class="task-panel-title">Tasks</span>
      <button id="task-default-btn" title="Default deadline days">7d</button>
      <button id="task-panel-close" aria-label="Close tasks">✕</button>
    </div>
    <div id="task-items"></div>
    <form id="task-add-form" autocomplete="off">
      <input type="text" id="task-input" placeholder="Add a task…">
    </form>
  </div>

  <!-- Theme Picker -->
  <div id="theme-picker">
    <button id="theme-btn" title="Change theme" aria-label="Change theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/>
        <circle cx="8.5"  cy="7.5" r="1.5"/><circle cx="6.5"  cy="12"   r="1.5"/>
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2v-.5c0-.55.45-1 1-1h2c2.76 0 5-2.24 5-5 0-5.52-4.48-10-10-10z"/>
      </svg>
    </button>
    <div id="theme-swatches" class="hidden">
      <button class="swatch" data-theme="pink"   title="Pink"></button>
      <button class="swatch" data-theme="blue"   title="Blue"></button>
      <button class="swatch" data-theme="yellow" title="Yellow"></button>
      <button class="swatch" data-theme="dark"   title="Dark"></button>
      <button class="swatch" data-theme="white"  title="White"></button>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
