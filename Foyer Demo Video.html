<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foyer — Demo Video</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=geist:300,400,500,600,700|geist-mono:400,500,600">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06060e; }
    #root { width: 100%; height: 100%; }
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.8); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script src="foyer-music.js"></script>
  <script type="text/babel">

    /* ── Tokens ─────────────────────────────────────────────── */
    const SAN = "'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
    const MON = "'Geist Mono', 'SF Mono', 'Fira Code', monospace";
    const ACC = '#f24822';

    /* ── Tweak defaults ─────────────────────────────────────── */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showCaptions": true,
      "accentColor": "#f24822",
      "musicVolume": "medium",
      "recordFPS": "30",
      "hideUIWhenRecording": true
    }/*EDITMODE-END*/;

    /* ── Site data ──────────────────────────────────────────── */
    const SITES = [
      { name: 'Google',  l: 'G', g: 'linear-gradient(135deg,#667eea,#764ba2)' },
      { name: 'YouTube', l: 'Y', g: 'linear-gradient(135deg,#f093fb,#f5576c)' },
      { name: 'GitHub',  l: 'G', g: 'linear-gradient(135deg,#4facfe,#00f2fe)' },
      { name: 'Notion',  l: 'N', g: 'linear-gradient(135deg,#43e97b,#38f9d7)' },
      { name: 'Figma',   l: 'F', g: 'linear-gradient(135deg,#fa709a,#fee140)' },
      { name: 'Linear',  l: 'L', g: 'linear-gradient(135deg,#a18cd1,#fbc2eb)' },
      { name: 'Slack',   l: 'S', g: 'linear-gradient(135deg,#fccb90,#d57eeb)' },
      { name: 'Reddit',  l: 'R', g: 'linear-gradient(135deg,#ff9a9e,#fecfef)' },
      { name: 'Spotify', l: 'S', g: 'linear-gradient(135deg,#96fbc4,#f9f586)' },
    ];

    /* ── Theme backgrounds ──────────────────────────────────── */
    const BG = {
      cream: [
        'radial-gradient(ellipse 58% 48% at 46% 10%,rgba(255,253,242,.96) 0%,rgba(252,244,224,.65) 38%,transparent 62%)',
        'radial-gradient(ellipse 52% 70% at 2% 50%,rgba(238,216,168,.60) 0%,transparent 58%)',
        'radial-gradient(ellipse 44% 38% at 91% 16%,rgba(252,240,212,.84) 0%,transparent 50%)',
        'radial-gradient(ellipse 62% 55% at 85% 84%,rgba(205,185,142,.62) 0%,transparent 54%)',
        'linear-gradient(135deg,#cfc3a2 0%,#ece3ca 36%,#f5eddb 52%,#ece3ca 68%,#cfc3a2 100%)',
      ].join(','),
      pink: [
        'radial-gradient(ellipse 80% 60% at 28% 22%,rgba(255,205,225,.72) 0%,transparent 60%)',
        'radial-gradient(ellipse 50% 45% at 14% 78%,rgba(250,180,210,.52) 0%,transparent 50%)',
        'linear-gradient(155deg,#b05578 0%,#c0688a 28%,#c8729a 55%,#a24a6e 100%)',
      ].join(','),
      blue: [
        'radial-gradient(ellipse 80% 60% at 28% 22%,rgba(195,228,255,.72) 0%,transparent 60%)',
        'radial-gradient(ellipse 50% 45% at 14% 78%,rgba(175,215,255,.52) 0%,transparent 50%)',
        'linear-gradient(155deg,#1a6fb8 0%,#2880c8 28%,#3090d8 55%,#1460a0 100%)',
      ].join(','),
      dark: [
        'radial-gradient(ellipse 70% 55% at 25% 20%,rgba(80,60,130,.55) 0%,transparent 55%)',
        'radial-gradient(ellipse 60% 50% at 75% 70%,rgba(60,45,105,.45) 0%,transparent 50%)',
        'linear-gradient(155deg,#08080f 0%,#0e0e1a 28%,#12121e 55%,#08080f 100%)',
      ].join(','),
      yellow: [
        'radial-gradient(ellipse 80% 60% at 28% 22%,rgba(255,248,190,.72) 0%,transparent 60%)',
        'linear-gradient(155deg,#c8920a 0%,#d8a018 28%,#e0aa20 55%,#be8c08 100%)',
      ].join(','),
    };

    /* ── FoyerTile ──────────────────────────────────────────── */
    function FoyerTile({ site, dark = false, lift = false, scale = 1, opacity = 1 }) {
      return (
        <div style={{
          width: 88, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7,
          opacity, transform: `scale(${scale})`, transformOrigin: 'center center',
          transition: 'opacity .15s, transform .15s',
        }}>
          <div style={{
            width: 60, height: 60, borderRadius: 16,
            background: 'rgba(255,255,255,0.14)',
            border: '1px solid rgba(255,255,255,0.22)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            overflow: 'hidden',
            boxShadow: lift
              ? '0 18px 48px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.15)'
              : '0 4px 16px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.12)',
          }}>
            <div style={{
              width: 38, height: 38, borderRadius: 8,
              background: site.g,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'white', fontSize: 19, fontWeight: 700, fontFamily: SAN,
            }}>{site.l}</div>
          </div>
          <span style={{
            fontSize: 11, fontWeight: 500, fontFamily: SAN,
            color: dark ? 'rgba(255,255,255,0.92)' : 'rgba(30,25,15,0.82)',
            textShadow: dark ? '0 1px 4px rgba(0,0,0,0.6)' : '0 1px 3px rgba(255,255,255,0.5)',
            textAlign: 'center', width: '100%',
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{site.name}</span>
        </div>
      );
    }

    /* ── BrowserScene ────────────────────────────────────────── */
    function BrowserScene() {
      const t = useTime();
      const GS = 88, GG = 28; // tile size + gap

      // Browser enter/exit
      const bOpacity = clamp((t - 3.5) / 0.9, 0, 1) * (1 - clamp((t - 27.5) / 0.8, 0, 1));
      const bY = animate({ from: 50, to: 0, start: 3.5, end: 4.6, ease: Easing.easeOutCubic })(t);

      // Theme
      const theme =
        t >= 26.5 ? 'dark' :
        t >= 25.5 ? 'blue' :
        t >= 24.5 ? 'pink' : 'cream';
      const dark = theme === 'dark';

      // Add-site modal
      const modalOn    = t >= 10.0 && t < 13.6;
      const typeUrl    = clamp((t - 10.5) / 1.8, 0, 1);
      const typeName   = clamp((t - 12.0) / 0.9, 0, 1);
      const urlStr     = 'https://spotify.com'.slice(0, Math.floor(typeUrl * 19));
      const nameStr    = 'Spotify'.slice(0, Math.floor(typeName * 7));
      const confirmLit = t > 12.8;
      const addPulse   = t >= 9.0 && t < 10.0;

      // Spotify tile revealed after modal closes
      const spotifyOn  = t >= 13.6;

      // Drag: GitHub (index 2) moves +4 cols right
      const dragOn     = t >= 15.0 && t < 18.3;
      const driftX     = animate({ from: 0, to: 464, start: 15.2, end: 17.8, ease: Easing.easeInOutCubic })(t);
      const driftY     = animate({ from: 0, to: 0,   start: 15.2, end: 17.8, ease: Easing.easeInOutCubic })(t);
      const dScale     = t >= 15.0 && t < 15.35 ? (1 + 0.12 * ((t - 15) / 0.35)) :
                         t >= 17.8 && t < 18.3  ? (1.12 - 0.12 * ((t - 17.8) / 0.5)) :
                         (dragOn ? 1.12 : 1);

      // Merge: Google + YouTube → group (t 19-20.6)
      const mergeStart = 19.0, mergeEnd = 20.6;
      const mergeProg  = clamp((t - mergeStart) / (mergeEnd - mergeStart), 0, 1);
      const merging    = t >= mergeStart && t < mergeEnd;
      const groupOn    = t >= mergeEnd;

      // Group overlay
      const overlayOn  = t >= 21.5 && t < 24.2;
      const oFade      = animate({ from: 0, to: 1, start: 21.5, end: 22.1, ease: Easing.easeOutCubic })(t) *
                         (1 - animate({ from: 0, to: 1, start: 23.6, end: 24.2, ease: Easing.easeInCubic })(t));

      // Theme picker
      const pickerOn   = t >= 23.5 && t < 27.6;
      const pFade      = animate({ from: 0, to: 1, start: 23.5, end: 24.1, ease: Easing.easeOutCubic })(t) *
                         (1 - animate({ from: 0, to: 1, start: 27.1, end: 27.6, ease: Easing.easeInCubic })(t));

      // Build ordered site list (GitHub moves to pos 6 after drag)
      const orderedSites = (() => {
        const base = [...SITES.slice(0, spotifyOn ? 9 : 8)];
        if (t >= 18.3) {
          const idx = base.findIndex(s => s.name === 'GitHub');
          if (idx >= 0) { const [g] = base.splice(idx, 1); base.splice(5, 0, g); }
        }
        return base;
      })();

      const gridSites = orderedSites.filter(s => {
        if ((groupOn || merging) && (s.name === 'Google' || s.name === 'YouTube')) return false;
        if (dragOn && s.name === 'GitHub') return false;
        return true;
      });

      // Dragged tile absolute base position
      const dragBase = { left: 48 + 2 * (GS + GG), top: 52 };

      return (
        <div style={{
          position: 'absolute', top: 112 + bY, left: 260,
          width: 1400, height: 856,
          opacity: bOpacity,
          borderRadius: 18, overflow: 'hidden',
          boxShadow: '0 50px 130px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.06)',
        }}>

          {/* ── Toolbar ── */}
          <div style={{
            height: 50,
            background: dark ? 'rgba(10,10,18,0.98)' : 'rgba(232,225,208,0.97)',
            borderBottom: dark ? '1px solid rgba(255,255,255,0.07)' : '1px solid rgba(0,0,0,0.10)',
            display: 'flex', alignItems: 'center', padding: '0 18px', gap: 16,
            flexShrink: 0,
          }}>
            <div style={{ display: 'flex', gap: 8 }}>
              {['#ff5f57','#febc2e','#28c840'].map(c =>
                <div key={c} style={{ width: 12, height: 12, borderRadius: '50%', background: c }} />
              )}
            </div>
            <div style={{
              flex: 1, maxWidth: 360, margin: '0 auto', height: 28, borderRadius: 8,
              background: dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)',
              border: dark ? '1px solid rgba(255,255,255,0.09)' : '1px solid rgba(0,0,0,0.09)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span style={{ fontSize: 11.5, fontFamily: SAN, color: dark ? 'rgba(255,255,255,0.32)' : 'rgba(0,0,0,0.36)' }}>
                New Tab
              </span>
            </div>
          </div>

          {/* ── New Tab content ── */}
          <div style={{
            position: 'absolute', top: 50, left: 0, right: 0, bottom: 0,
            background: BG[theme],
            transition: 'background 0.9s ease',
            overflow: 'hidden',
          }}>

            {/* Tile grid */}
            <div style={{
              position: 'absolute', top: 56, left: 52, right: 52,
              display: 'grid',
              gridTemplateColumns: `repeat(auto-fill, ${GS}px)`,
              gap: `${GG}px`,
            }}>
              {/* Group tile */}
              {groupOn && (
                <div style={{
                  width: 88, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 7,
                  opacity: animate({ from: 0, to: 1, start: mergeEnd, end: mergeEnd + 0.5, ease: Easing.easeOutBack })(t),
                  transform: `scale(${animate({ from: 0.45, to: 1, start: mergeEnd, end: mergeEnd + 0.5, ease: Easing.easeOutBack })(t)})`,
                }}>
                  <div style={{
                    width: 60, height: 60, borderRadius: 16,
                    background: 'rgba(200,200,225,0.18)',
                    border: dark ? '1px solid rgba(255,255,255,0.18)' : '1px solid rgba(0,0,0,0.10)',
                    padding: 7,
                    display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 2,
                    boxShadow: '0 4px 16px rgba(0,0,0,0.22)',
                  }}>
                    {[...Array(9)].map((_, i) => (
                      <div key={i} style={{
                        borderRadius: 2, aspectRatio: '1',
                        background: i < 4 ? SITES[i].g : (dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)'),
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        color: 'white', fontSize: 5.5, fontWeight: 800, fontFamily: SAN,
                      }}>{i < 4 ? SITES[i].l : ''}</div>
                    ))}
                  </div>
                  <span style={{
                    fontSize: 11, fontWeight: 500, fontFamily: SAN,
                    color: dark ? 'rgba(255,255,255,0.92)' : 'rgba(30,25,15,0.82)',
                    textShadow: dark ? '0 1px 4px rgba(0,0,0,0.6)' : '0 1px 3px rgba(255,255,255,0.5)',
                    textAlign: 'center', width: '100%', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                  }}>Work</span>
                </div>
              )}

              {/* Merging tiles (Google + YouTube fading out) */}
              {merging && [SITES[0], SITES[1]].map(site => (
                <FoyerTile key={site.name} site={site} dark={dark}
                  scale={1 - Easing.easeInCubic(mergeProg) * 0.55}
                  opacity={1 - Easing.easeInQuad(mergeProg)}
                />
              ))}

              {/* Regular tiles */}
              {gridSites.map(site => {
                const origIdx = SITES.findIndex(s => s.name === site.name);
                const isSpotify = site.name === 'Spotify';
                const delay  = isSpotify ? 13.6 : 4.8 + origIdx * 0.13;
                const dur    = isSpotify ? 0.5 : 0.4;
                const op  = animate({ from: 0, to: 1, start: delay, end: delay + dur, ease: Easing.easeOutCubic })(t);
                const ty  = animate({ from: 22, to: 0, start: delay, end: delay + dur, ease: Easing.easeOutCubic })(t);
                return (
                  <div key={site.name} style={{ opacity: op, transform: `translateY(${ty}px)` }}>
                    <FoyerTile site={site} dark={dark} />
                  </div>
                );
              })}
            </div>

            {/* Floating dragged tile */}
            {dragOn && (
              <div style={{
                position: 'absolute',
                left: dragBase.left + driftX,
                top: dragBase.top + driftY,
                zIndex: 60,
                filter: 'drop-shadow(0 20px 40px rgba(0,0,0,0.6))',
                pointerEvents: 'none',
                transform: `scale(${dScale})`,
                transformOrigin: 'center center',
              }}>
                <FoyerTile site={SITES[2]} dark={dark} lift />
              </div>
            )}

            {/* Add-site modal */}
            {modalOn && (
              <div style={{
                position: 'absolute', inset: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: 'rgba(0,0,0,0.44)',
                backdropFilter: 'blur(14px)',
                opacity: animate({ from: 0, to: 1, start: 10.0, end: 10.5, ease: Easing.easeOutCubic })(t),
              }}>
                <div style={{
                  background: 'rgba(20,22,40,0.97)',
                  border: '1px solid rgba(255,255,255,0.13)',
                  borderRadius: 22, padding: '28px 28px 24px', width: 380,
                  boxShadow: '0 28px 70px rgba(0,0,0,0.6)',
                  transform: `scale(${animate({ from: 0.86, to: 1, start: 10.0, end: 10.5, ease: Easing.easeOutBack })(t)})`,
                }}>
                  <div style={{ fontSize: 18, fontWeight: 600, color: 'white', marginBottom: 18, fontFamily: SAN, letterSpacing: '-0.02em' }}>
                    Add Site
                  </div>
                  {/* Favicon preview */}
                  <div style={{
                    width: 72, height: 72, borderRadius: 18,
                    background: 'rgba(255,255,255,0.08)',
                    border: '1px solid rgba(255,255,255,0.13)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    margin: '0 auto 20px', overflow: 'hidden',
                    transition: 'border-color .3s, box-shadow .3s',
                    ...(typeUrl > 0.85 ? { borderColor: 'rgba(255,255,255,0.26)', boxShadow: '0 4px 18px rgba(0,0,0,0.35)' } : {}),
                  }}>
                    {typeUrl > 0.85 ? (
                      <div style={{
                        width: 52, height: 52, borderRadius: 10,
                        background: SITES[8].g,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        color: 'white', fontSize: 25, fontWeight: 700, fontFamily: SAN,
                      }}>S</div>
                    ) : (
                      <span style={{ fontSize: 28, fontWeight: 300, color: 'rgba(255,255,255,0.2)', fontFamily: SAN }}>?</span>
                    )}
                  </div>
                  {/* URL */}
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11.5, fontWeight: 500, color: 'rgba(255,255,255,0.48)', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 5, fontFamily: SAN }}>URL</div>
                    <div style={{
                      padding: '10px 14px', borderRadius: 12, minHeight: 40,
                      border: '1px solid rgba(100,160,255,0.55)',
                      background: 'rgba(255,255,255,0.09)',
                      color: 'white', fontSize: 13, fontFamily: MON,
                      display: 'flex', alignItems: 'center',
                    }}>
                      {urlStr}<span style={{ animation: 'blink 1s step-end infinite', opacity: 0.55 }}>|</span>
                    </div>
                  </div>
                  {/* Name */}
                  <div style={{ marginBottom: 0 }}>
                    <div style={{ fontSize: 11.5, fontWeight: 500, color: 'rgba(255,255,255,0.48)', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 5, fontFamily: SAN }}>Name</div>
                    <div style={{
                      padding: '10px 14px', borderRadius: 12, minHeight: 40,
                      border: '1px solid rgba(255,255,255,0.13)',
                      background: 'rgba(255,255,255,0.07)',
                      color: 'white', fontSize: 14, fontFamily: SAN,
                      display: 'flex', alignItems: 'center',
                    }}>
                      {nameStr || <span style={{ color: 'rgba(255,255,255,0.22)' }}>My Site</span>}
                    </div>
                  </div>
                  {/* Actions */}
                  <div style={{ display: 'flex', gap: 10, marginTop: 22 }}>
                    <button style={{
                      flex: 1, padding: 11, borderRadius: 12, cursor: 'default',
                      border: '1px solid rgba(255,255,255,0.13)',
                      background: 'rgba(255,255,255,0.08)', color: 'rgba(255,255,255,0.72)',
                      fontSize: 14, fontWeight: 600, fontFamily: SAN,
                    }}>Cancel</button>
                    <button style={{
                      flex: 1, padding: 11, borderRadius: 12, border: 'none', cursor: 'default',
                      background: 'linear-gradient(135deg,#4f8cff,#6a5acd)',
                      color: 'white', fontSize: 14, fontWeight: 600, fontFamily: SAN,
                      boxShadow: `0 2px ${confirmLit ? 22 : 12}px rgba(79,140,255,${confirmLit ? 0.65 : 0.32})`,
                      transform: confirmLit ? 'scale(1.03)' : 'scale(1)',
                      transition: 'box-shadow .3s, transform .3s',
                    }}>Add</button>
                  </div>
                </div>
              </div>
            )}

            {/* Group overlay */}
            {overlayOn && (
              <div style={{
                position: 'absolute', inset: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: 'rgba(0,0,0,0.46)',
                backdropFilter: 'blur(22px)',
                opacity: oFade,
              }}>
                <div style={{
                  background: 'rgb(20,24,42)',
                  border: '1px solid rgba(255,255,255,0.15)',
                  borderRadius: 28, padding: '28px 28px 24px', width: 500,
                  boxShadow: '0 32px 88px rgba(0,0,0,0.7)',
                  transform: `scale(${animate({ from: 0.86, to: 1, start: 21.5, end: 22.1, ease: Easing.easeOutBack })(t)})`,
                }}>
                  <div style={{ textAlign: 'center', fontSize: 17, fontWeight: 600, color: 'rgba(255,255,255,0.95)', marginBottom: 24, fontFamily: SAN, letterSpacing: '-0.02em' }}>
                    Work
                  </div>
                  <div style={{
                    display: 'grid', gridTemplateColumns: 'repeat(3, 80px)',
                    gap: 20, justifyContent: 'center', padding: '4px 0 16px',
                  }}>
                    {SITES.slice(0, 6).map((site, i) => (
                      <div key={site.name} style={{
                        width: 80, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                        opacity: animate({ from: 0, to: 1, start: 21.6 + i * 0.08, end: 21.9 + i * 0.08, ease: Easing.easeOutCubic })(t),
                        transform: `scale(${animate({ from: 0.72, to: 1, start: 21.6 + i * 0.08, end: 21.9 + i * 0.08, ease: Easing.easeOutBack })(t)})`,
                      }}>
                        <div style={{
                          width: 54, height: 54, borderRadius: 14,
                          background: site.g,
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          color: 'white', fontSize: 22, fontWeight: 700, fontFamily: SAN,
                          boxShadow: '0 3px 12px rgba(0,0,0,0.35)',
                        }}>{site.l}</div>
                        <span style={{ fontSize: 11, fontWeight: 500, color: 'rgba(255,255,255,0.85)', textAlign: 'center', fontFamily: SAN }}>{site.name}</span>
                      </div>
                    ))}
                  </div>
                  {/* Add button inside group */}
                  <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 4 }}>
                    <div style={{
                      width: 36, height: 36, borderRadius: '50%',
                      background: 'rgba(255,255,255,0.07)',
                      border: '1.5px dashed rgba(255,255,255,0.3)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: 'rgba(255,255,255,0.5)', fontSize: 22, fontWeight: 300,
                    }}>+</div>
                  </div>
                </div>
              </div>
            )}

            {/* + Add button */}
            {!modalOn && (
              <div style={{
                position: 'absolute', bottom: 32, right: 32,
                width: 54, height: 54, borderRadius: '50%',
                background: addPulse

                    <circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12" r="1.5"/>
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.1 0 2-.9 2-2v-.5c0-.55.45-1 1-1h2c2.76 0 5-2.24 5-5 0-5.52-4.48-10-10-10z"/>
                  </svg>
                </div>
                <div style={{
                  display: 'flex', flexDirection: 'column', gap: 8,
                  background: dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)',
                  border: dark ? '1px solid rgba(255,255,255,0.13)' : '1px solid rgba(0,0,0,0.11)',
                  borderRadius: 20, padding: 8,
                  backdropFilter: 'blur(20px)',
                  boxShadow: '0 8px 32px rgba(0,0,0,0.28)',
                }}>
                  {[
                    { th: 'pink',  bg: 'linear-gradient(135deg,#c8729a,#a24a6e)' },
                    { th: 'blue',  bg: 'linear-gradient(135deg,#3090d8,#1460a0)' },
                    { th: 'dark',  bg: 'linear-gradient(135deg,#1e1e30,#08080f)' },
                    { th: 'cream', bg: 'linear-gradient(135deg,#f2e9d5,#e0d4b6)', outline: 'inset 0 0 0 1px rgba(0,0,0,0.12)' },
                  ].map(sw => (
                    <div key={sw.th} style={{
                      width: 26, height: 26, borderRadius: '50%',
                      background: sw.bg,
                      boxShadow: theme === sw.th
                        ? '0 0 0 2.5px rgba(255,255,255,0.92), 0 0 0 4.5px rgba(255,255,255,0.28)'
                        : (sw.outline || ''),
                      transition: 'box-shadow .35s',
                    }} />
                  ))}

          </div>
        </div>
      );

          }}>

          <div style={{
            fontFamily: MON, fontSize: 11, fontWeight: 600, color: ACC,
            textTransform: 'uppercase', letterSpacing: '0.11em',

    /* ── EndCard ─────────────────────────────────────────────── */
    function EndCard() {

      return (
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          gap: 22, opacity: op, pointerEvents: 'none',
        }}>
          <div style={{ transform: `scale(${animate({ from: 0.45, to: 1, start: 28.2, end: 29.1, ease: Easing.easeOutBack })(t)})` }}>
            <img src="foyer-icon.png" width={92} height={92} style={{ borderRadius: 22, display: 'block' }} alt="" />
          </div>
          <div style={{ fontFamily: SAN, fontSize: 76, fontWeight: 700, color: 'white', letterSpacing: '-0.045em', lineHeight: 1 }}>
            Foyer
          </div>
          <div style={{
            fontFamily: SAN, fontSize: 22, fontWeight: 400, color: 'rgba(255,255,255,0.4)', letterSpacing: '-0.01em',
            opacity: animate({ from: 0, to: 1, start: 28.7, end: 29.4, ease: Easing.easeOutCubic })(t),
          }}>
            A clean home for every new tab.
          </div>
          <div style={{
            marginTop: 6,
            fontFamily: SAN, fontSize: 16, fontWeight: 600, color: 'white',
            background: ACC, borderRadius: 999, padding: '13px 32px', letterSpacing: '-0.01em',
            opacity: animate({ from: 0, to: 1, start: 29.2, end: 30.0, ease: Easing.easeOutBack })(t),
            transform: `scale(${animate({ from: 0.8, to: 1, start: 29.2, end: 30.0, ease: Easing.easeOutBack })(t)})`,
          }}>Install for Chrome →</div>
        </div>
      );
    }

    /* ── Caption / FeatureTag ────────────────────────────────── */
    function Caption({ children, start, end }) {
      const t = useTime();
      const op = animate({ from: 0, to: 1, start, end: start + 0.55, ease: Easing.easeOutCubic })(t) *
                 (1 - animate({ from: 0, to: 1, start: end - 0.5, end, ease: Easing.easeInCubic })(t));
      return (
        <div style={{
          position: 'absolute', bottom: 52, left: '50%', transform: 'translateX(-50%)',
          fontFamily: MON, fontSize: 12, fontWeight: 500, letterSpacing: '0.12em',
          textTransform: 'uppercase', color: 'rgba(255,255,255,0.36)',
          opacity: op, whiteSpace: 'nowrap', pointerEvents: 'none',
        }}>{children}</div>
      );
    }

    function FeatureTag({ children, start, end }) {
      const t = useTime();
      const op = animate({ from: 0, to: 1, start, end: start + 0.4, ease: Easing.easeOutCubic })(t) *
                 (1 - animate({ from: 0, to: 1, start: end - 0.4, end, ease: Easing.easeInCubic })(t));
      const ty = animate({ from: -10, to: 0, start, end: start + 0.4, ease: Easing.easeOutCubic })(t);
      return (
        <div style={{
          position: 'absolute', top: 36, left: '50%',
          transform: `translateX(-50%) translateY(${ty}px)`,
          fontFamily: MON, fontSize: 11, fontWeight: 600, color: ACC,
          textTransform: 'uppercase', letterSpacing: '0.1em',
          background: 'rgba(242,72,34,0.10)', border: '1px solid rgba(242,72,34,0.24)',
          borderRadius: 999, padding: '5px 15px',
          opacity: op, whiteSpace: 'nowrap', pointerEvents: 'none',
        }}>{children}</div>
      );
    }

    /* ── RecordButton ────────────────────────────────────────── */
    function RecordButton({ tweaks, hidden }) {
      const [phase,    setPhase]    = React.useState('idle'); // idle | preparing | recording | encoding
      const [progress, setProgress] = React.useState(0);
      const recRef      = React.useRef(null);
      const intervalRef = React.useRef(null);
      const cleanupRef  = React.useRef(null);
      const captureRef  = React.useRef({ active: false });

      async function handleClick() {
        if (phase === 'recording' || phase === 'preparing') {
          // Cancel
          captureRef.current.active = false;
          clearInterval(intervalRef.current);
          if (recRef.current && recRef.current.state === 'recording') recRef.current.stop();
          if (cleanupRef.current) { cleanupRef.current(); cleanupRef.current = null; }
          setPhase('idle'); setProgress(0);
          return;
        }
        if (phase !== 'idle') return;

        setPhase('preparing');
        window.MUSIC.start();

        // Reset stage to t=0
        await new Promise(r => setTimeout(r, 40));
        if (window.__foyerResetStage) window.__foyerResetStage();
        await new Promise(r => setTimeout(r, 120));

        // Fresh audio context starting from t=0
        const rec = window.MUSIC.startRecording();
        cleanupRef.current = rec ? rec.cleanup : null;

        // Offscreen canvas — match the root element's rendered size
        const root = document.getElementById('root');
        const captureCanvas = document.createElement('canvas');
        captureCanvas.width  = root.offsetWidth  || 1920;
        captureCanvas.height = root.offsetHeight || 1080;
        const captureCtx = captureCanvas.getContext('2d');

        // Video stream from canvas
        const fps = parseInt(tweaks ? tweaks.recordFPS : '30', 10) || 30;
        const videoStream = captureCanvas.captureStream(fps);

        // Combine video + synthesised audio
        const audioTracks = rec ? rec.stream.getAudioTracks() : [];
        const combined    = new MediaStream([videoStream.getVideoTracks()[0], ...audioTracks]);

        const mime = (
          MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' :
          MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus') ? 'video/webm;codecs=vp8,opus' :
          'video/webm'
        );
        const bitsPerSec = tweaks && tweaks.recordFPS === '15' ? 3000000 : 6000000;

        const chunks = [];
        const recorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: bitsPerSec });
        recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
          captureRef.current.active = false;
          if (cleanupRef.current) { cleanupRef.current(); cleanupRef.current = null; }
          setPhase('encoding');
          const blob = new Blob(chunks, { type: 'video/webm' });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href = url; a.download = 'foyer-demo.webm';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          setTimeout(() => { URL.revokeObjectURL(url); setPhase('idle'); setProgress(0); }, 2000);
        };

        recorder.start(200);
        recRef.current = recorder;
        captureRef.current.active = true;
        setPhase('recording'); setProgress(0);

        // html2canvas capture loop — draws DOM frames onto captureCanvas
        (async function captureLoop() {
          while (captureRef.current.active) {
            await new Promise(r => requestAnimationFrame(r));
            if (!captureRef.current.active) break;
            try {
              const snap = await html2canvas(root, {
                scale: 1,
                useCORS: true,
                allowTaint: true,
                logging: false,
                backgroundColor: '#06060e',
                width: captureCanvas.width,
                height: captureCanvas.height,
              });
              captureCtx.drawImage(snap, 0, 0);
            } catch (_) {}
          }
        })();

        // Progress ticker + auto-stop after 32s
        const DURATION = 32300;
        const t0 = Date.now();
        intervalRef.current = setInterval(() => {
          const pct = Math.min(100, (Date.now() - t0) / DURATION * 100);
          setProgress(pct);
          if (pct >= 100) {
            clearInterval(intervalRef.current);
            captureRef.current.active = false;
            if (recorder.state === 'recording') recorder.stop();
          }
        }, 100);
      }

      const secsLeft = Math.ceil(32 * (1 - progress / 100));

      if (hidden) return null;

      return (
        <div style={{
          position: 'absolute', top: 22, left: 22, zIndex: 200,
          display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 6,
          pointerEvents: 'all',
        }}>
          <button
            onClick={e => { e.stopPropagation(); handleClick(); }}
            style={{
              display: 'flex', alignItems: 'center', gap: 8,
              padding: '7px 14px 7px 11px', borderRadius: 999,
              border: '1px solid ' + (phase === 'recording' ? 'rgba(255,80,80,0.45)' : 'rgba(255,255,255,0.14)'),
              background: phase === 'recording' ? 'rgba(200,20,20,0.18)' : 'rgba(12,12,24,0.72)',
              color: phase === 'recording' ? '#ff7070' : 'rgba(255,255,255,0.62)',
              fontSize: 11, fontWeight: 600, fontFamily: MON,
              letterSpacing: '0.08em', textTransform: 'uppercase',
              cursor: phase === 'preparing' || phase === 'encoding' ? 'default' : 'pointer',
              backdropFilter: 'blur(14px)',
              transition: 'background .25s, border-color .25s, color .25s',
              whiteSpace: 'nowrap', outline: 'none',
            }}
          >
            <div style={{
              width: 7, height: 7, borderRadius: '50%', flexShrink: 0,
              background: phase === 'recording' ? '#ff4040' : 'rgba(255,255,255,0.3)',
              animation: phase === 'recording' ? 'blink 1.1s step-end infinite' : 'none',
            }} />
            {phase === 'idle'      && 'Record & Download'}
            {phase === 'preparing' && 'Starting\u2026'}
            {phase === 'recording' && ('Recording \u2014 ' + secsLeft + 's')}
            {phase === 'encoding'  && 'Saving\u2026'}
          </button>

          {phase === 'recording' && (
            <div style={{ width: 156, height: 2, borderRadius: 1, marginLeft: 3, background: 'rgba(255,255,255,0.08)', overflow: 'hidden' }}>
              <div style={{ height: '100%', borderRadius: 1, background: 'linear-gradient(90deg,#ff4040,#ff7070)', width: progress + '%', transition: 'width .1s linear' }} />
            </div>
          )}
        </div>
      );
    }

    /* ── MuteButton ──────────────────────────────────────────── */
    function MuteButton() {
      const [muted,   setMuted]   = React.useState(false);
      const [started, setStarted] = React.useState(false);

      // Poll until MUSIC.start() has been called (happens on first click)
      React.useEffect(() => {
        const id = setInterval(() => {
          if (window.MUSIC && window.MUSIC.isStarted()) {
            setStarted(true);
            clearInterval(id);
          }
        }, 200);
        return () => clearInterval(id);
      }, []);

      function toggle(e) {
        e.stopPropagation();
        if (!started) {
          window.MUSIC && window.MUSIC.start();
          return;
        }
        const next = !muted;
        setMuted(next);
        window.MUSIC && window.MUSIC.setMuted(next);
      }

      const label = !started ? 'Click anywhere to enable sound'
                  : muted    ? 'Unmute'
                  :            'Mute';

      return (
        <div
          onClick={toggle}
          title={label}
          style={{
            position: 'absolute', bottom: 58, right: 22,
            width: 38, height: 38, borderRadius: '50%',
            background: started && !muted
              ? 'rgba(242,72,34,0.12)'
              : 'rgba(255,255,255,0.07)',
            border: started && !muted
              ? '1px solid rgba(242,72,34,0.32)'
              : '1px solid rgba(255,255,255,0.13)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', zIndex: 200,
            color: started && !muted ? ACC : 'rgba(255,255,255,0.32)',
            transition: 'background .3s, border-color .3s, color .3s',
            backdropFilter: 'blur(8px)',
          }}
        >
          {muted ? (
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          ) : (
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              {started && <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>}
            </svg>
          )}
        </div>
      );
    }

    /* ── App ─────────────────────────────────────────────────── */
    function App({ tweaks, setTweak }) {
      const showCaptions = !tweaks || tweaks.showCaptions;
      const hideControls = tweaks && tweaks.hideUIWhenRecording; // passed as prop to RecordButton
      const accent = (tweaks && tweaks.accentColor) || ACC;
      return (
        <div style={{ position: 'relative', width: 1920, height: 1080, background: '#06060e', overflow: 'hidden' }}>

          {/* Ambient glow */}
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none',
            background: 'radial-gradient(ellipse 55% 55% at 50% 50%, rgba(35,15,70,.45) 0%, transparent 70%)',
          }} />

          {/* Scenes */}
          <Sprite start={0} end={4.5}><TitleCard /></Sprite>
          <BrowserScene />
          <Sprite start={27.5} end={32}><EndCard /></Sprite>

          {/* Feature tags */}
          <FeatureTag start={5.2}  end={9.2}>Home Screen</FeatureTag>
          <FeatureTag start={9.8}  end={14.0}>Add any site</FeatureTag>
          <FeatureTag start={14.8} end={18.6}>Drag to rearrange</FeatureTag>
          <FeatureTag start={19.2} end={24.2}>Group sites together</FeatureTag>
          <FeatureTag start={24.2} end={27.6}>Beautiful themes</FeatureTag>

          {/* Controls */}
          <RecordButton tweaks={tweaks} />
          <MuteButton />

          {/* Tweaks panel */}
          <TweaksPanel>
            <TweakSection label="Recording" />
            <TweakRadio label="Frame rate" value={tweaks ? tweaks.recordFPS : '30'}
              options={['15','24','30']}
              onChange={v => setTweak('recordFPS', v)} />
            <TweakToggle label="Hide UI when recording" value={tweaks ? tweaks.hideUIWhenRecording : true}
              onChange={v => setTweak('hideUIWhenRecording', v)} />
            <TweakSection label="Playback" />
            <TweakToggle label="Show captions" value={tweaks ? tweaks.showCaptions : true}
              onChange={v => setTweak('showCaptions', v)} />
            <TweakSection label="Style" />
            <TweakColor label="Accent color" value={tweaks ? tweaks.accentColor : ACC}
              options={['#f24822','#4f8cff','#43e97b','#f5a623']}
              onChange={v => setTweak('accentColor', v)} />
            <TweakRadio label="Music volume" value={tweaks ? tweaks.musicVolume : 'medium'}
              options={['off','low','medium','high']}
              onChange={v => {
                setTweak('musicVolume', v);
                if (window.MUSIC) {
                  if (v === 'off') window.MUSIC.setMuted(true);
                  else { window.MUSIC.setMuted(false); window.MUSIC.setVolume && window.MUSIC.setVolume(v); }
                }
              }} />
          </TweaksPanel>

          {/* Captions */}
          {showCaptions && <Caption start={5.8}  end={9.2}>Every new tab opens your home screen</Caption>}
          {showCaptions && <Caption start={10.4} end={13.6}>Add any site in seconds</Caption>}
          {showCaptions && <Caption start={15.3} end={18.6}>Drag to reorder, anytime</Caption>}
          {showCaptions && <Caption start={19.8} end={23.8}>Group related sites together</Caption>}
          {showCaptions && <Caption start={24.2} end={27.6}>Beautiful themes — make it yours</Caption>}
        </div>
      );
    }

    function Root() {
      const [stageKey, setStageKey] = React.useState(0);
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        // Expose reset function so RecordButton can restart from t=0
        window.__foyerResetStage = () => setStageKey(k => k + 1);
        return () => { delete window.__foyerResetStage; };
      }, []);

      return (
        <Stage key={stageKey} width={1920} height={1080} duration={32} background="#06060e" autoplay={true} loop={true}>
          <App tweaks={tweaks} setTweak={setTweak} />
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

  </script>
